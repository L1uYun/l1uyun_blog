{{ if and ( .Site.Params.twikoo.enable ) (and (not .Params.disable_comments)
    (or (eq .Kind "404") (and (not .IsHome) .Content))) }}
    <section class="comments">
      <div id="twikoo"></div>
      <script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.8/dist/twikoo.all.min.js"></script>
      <script>
        twikoo.init({
          envId: '{{ .Site.Params.twikoo.envId }}', // 你的环境ID
          el: '#twikoo',
          region: '{{ .Site.Params.twikoo.region }}', // 环境地域，默认为 ap-shanghai
          path: window.location.pathname,
          lang: 'zh-CN'
        });
      </script>
    </section>
{{ end }}
